<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE6D6;
    --ink: #2C2416;
    --ink-muted: #6B5F4A;
    --gold: #C4A882;
    --gold-light: #E8D9C0;
    --sage: #6B8C6B;
    --sage-light: #8FAF8F;
  }

  html, body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── PIN SCREEN ── */
  #pin-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .pin-ornament {
    width: 1px;
    height: 48px;
    background: var(--gold);
    margin: 0 auto 40px;
    opacity: 0.5;
  }

  #pin-screen h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 32px;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }

  #pin-screen p {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 300;
    margin-bottom: 40px;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .pin-dot.filled {
    background: var(--ink);
    border-color: var(--ink);
  }

  .pin-dot.error {
    background: #C4717A;
    border-color: #C4717A;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    gap: 10px;
    justify-content: center;
  }

  .pin-key {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid var(--gold-light);
    background: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pin-key:hover { background: var(--cream-dark); border-color: var(--gold); }
  .pin-key:active { transform: scale(0.93); }

  .pin-key.del {
    font-size: 13px;
    color: var(--ink-muted);
    border-color: transparent;
    background: transparent;
  }

  .pin-key.del:hover { background: var(--cream-dark); border-color: var(--gold-light); }

  .pin-key.zero { grid-column: 2; }

  .pin-error-msg {
    margin-top: 20px;
    font-size: 12px;
    color: #C4717A;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 0.2s;
    height: 18px;
  }

  .pin-error-msg.visible { opacity: 1; }

  /* ── LIBRARY ── */
  #library { display: none; }

  header {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 48px 0;
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }

  .logo { width: 44px; height: 44px; flex-shrink: 0; margin-top: 6px; }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 36px;
    letter-spacing: -0.3px;
    line-height: 1.15;
  }

  .header-text p {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 8px;
    font-weight: 300;
    line-height: 1.7;
  }

  .divider {
    max-width: 900px;
    margin: 32px auto 40px;
    padding: 0 48px;
  }
  .divider svg { width: 100%; display: block; }

  /* FILTERS */
  .filters {
    max-width: 900px;
    margin: 0 auto 28px;
    padding: 0 48px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--gold-light);
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--sage); color: var(--sage); }
  .filter-btn.active { background: var(--sage); border-color: var(--sage); color: #fff; }

  /* TOOLS TABLE */
  .tools-list {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 48px 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tool-row {
    background: #fff;
    border: 1px solid var(--gold-light);
    border-radius: 10px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .tool-row:hover {
    border-color: var(--sage);
    box-shadow: 0 4px 16px rgba(44,36,22,0.06);
  }

  .tool-row-left { display: flex; align-items: center; gap: 16px; }

  .tool-category-badge {
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    background: #EEF4EE;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tool-name {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: 17px;
    color: var(--ink);
  }

  .tool-row-right {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .tool-client {
    font-size: 11px;
    color: var(--ink-muted);
    font-weight: 300;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .tool-link {
    font-size: 11px;
    color: var(--sage);
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .tool-row[data-hidden="true"] { display: none; }

  footer {
    text-align: center;
    padding: 0 40px 48px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  @media (max-width: 600px) {
    header { padding: 40px 24px 0; flex-direction: column; gap: 14px; }
    .divider, .filters { padding: 0 24px; }
    .tools-list { padding: 0 24px 60px; }
    .tool-row { grid-template-columns: 1fr; }
    .tool-row-right { justify-content: space-between; }
  }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-ornament"></div>
  <h1>Tools Library</h1>
  <p>Enter your PIN to continue</p>

  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <div class="pin-pad">
    <button class="pin-key" onclick="pressKey('1')">1</button>
    <button class="pin-key" onclick="pressKey('2')">2</button>
    <button class="pin-key" onclick="pressKey('3')">3</button>
    <button class="pin-key" onclick="pressKey('4')">4</button>
    <button class="pin-key" onclick="pressKey('5')">5</button>
    <button class="pin-key" onclick="pressKey('6')">6</button>
    <button class="pin-key" onclick="pressKey('7')">7</button>
    <button class="pin-key" onclick="pressKey('8')">8</button>
    <button class="pin-key" onclick="pressKey('9')">9</button>
    <button class="pin-key zero" onclick="pressKey('0')">0</button>
    <button class="pin-key del" onclick="deleteKey()">⌫</button>
  </div>

  <div class="pin-error-msg" id="pin-error">Incorrect PIN</div>
</div>

<!-- LIBRARY -->
<div id="library">

  <header>
    <svg class="logo" viewBox="0 0 44 44" fill="none" aria-hidden="true">
      <circle cx="22" cy="22" r="21" stroke="#6B8C6B" stroke-width="1"/>
      <line x1="22" y1="36" x2="22" y2="23" stroke="#6B8C6B" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M22 29 Q15 25 11 18 Q9 12 15 11 Q20 10 21 17" stroke="#6B8C6B" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M22 25 Q16 22 13 16" stroke="#8FAF8F" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <path d="M22 29 Q29 25 33 18 Q35 12 29 11 Q24 10 23 17" stroke="#6B8C6B" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M22 25 Q28 22 31 16" stroke="#8FAF8F" stroke-width="0.9" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="header-text">
      <h1>Tools Library</h1>
      <p>Every tool you've built. Click any row to open it.</p>
    </div>
  </header>

  <div class="divider">
    <svg viewBox="0 0 804 16" height="16" preserveAspectRatio="none">
      <path d="M0 12 Q201 3 402 9 Q603 15 804 6" stroke="#C4A882" stroke-width="0.8" fill="none" opacity="0.55"/>
    </svg>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterTools('all', this)">All</button>
    <button class="filter-btn" onclick="filterTools('Control & Safety', this)">Control & Safety</button>
    <!-- Add more category filters here as you build more tools -->
  </div>

  <div class="tools-list" id="tools-list">

    <!-- FINDING GROUND -->
    <a href="../Charlotte/finding-ground.html" class="tool-row" data-category="Control & Safety">
      <div class="tool-row-left">
        <span class="tool-category-badge">Control & Safety</span>
        <span class="tool-name">Finding Ground</span>
      </div>
      <div class="tool-row-right">
        <span class="tool-client">Charlotte</span>
        <span class="tool-link">Open →</span>
      </div>
    </a>

    <!-- ADD NEW TOOLS ABOVE THIS LINE -->

  </div>

  <footer>breathwork integration · tools library</footer>

</div>

<script>
  const PIN = '1996';
  let entered = '';

  function pressKey(k) {
    if (entered.length >= 4) return;
    entered += k;
    updateDots();
    if (entered.length === 4) checkPin();
  }

  function deleteKey() {
    entered = entered.slice(0, -1);
    updateDots();
    document.getElementById('pin-error').classList.remove('visible');
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('d' + i);
      dot.classList.remove('filled', 'error');
      if (i < entered.length) dot.classList.add('filled');
    }
  }

  function checkPin() {
    if (entered === PIN) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('library').style.display = 'block';
    } else {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.remove('filled');
        dot.classList.add('error');
      }
      document.getElementById('pin-error').classList.add('visible');
      setTimeout(() => {
        entered = '';
        updateDots();
        for (let i = 0; i < 4; i++) {
          document.getElementById('d' + i).classList.remove('error');
        }
      }, 800);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    if (e.key === 'Backspace') deleteKey();
  });

  function filterTools(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tool-row').forEach(row => {
      if (category === 'all' || row.dataset.category === category) {
        row.dataset.hidden = 'false';
      } else {
        row.dataset.hidden = 'true';
      }
    });
  }
</script>

</body>
</html>
